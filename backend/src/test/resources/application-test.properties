# ═══════════════════════════════════════════════════════════════
#  Test profile — activated by @ActiveProfiles("test")
#  Pins an isolated in-memory H2 database so tests never touch the
#  hosted Supabase instance and run fully offline & deterministically.
# ═══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:h2:mem:neobanktest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Non-secret, test-only signing key (Base64, 256-bit)
jwt.secret=crnJH8M8u1W9q7f7oj4AXTOKl2gP3AcXqdYb7NbsWo0IoISDnnUxz8IsuTS4SVeW
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000
