# ═══════════════════════════════════════════════════════════════
#  NeoBank Backend — Application Configuration (Dev Profile)
# ═══════════════════════════════════════════════════════════════

spring.application.name=neobank
server.port=8081

# ─── Database Configuration (externalized) ───────────────────
# Values come from environment variables (see backend/.env.local).
# Defaults below run a local in-memory H2 DB so the app boots with zero config.
# To use the hosted Supabase PostgreSQL, set the DATABASE_* vars before starting.
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:neobankdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# ─── JPA / Hibernate Settings ─────────────────────────────────
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ─────────────────────────────────────────────────────
# Secret must be Base64-encoded and at least 256 bits for HS256.
# Provide a strong JWT_SECRET via the environment in any real deployment;
# the default below is for local/dev convenience only.
jwt.secret=${JWT_SECRET:ZGV2T25seUxvY2FsSldUU2VjcmV0Q2hhbmdlTWVJbkVudkRvTm90VXNlSW5Qcm9k}
jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY:900000}
jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY:604800000}

# ─── App Defaults ────────────────────────────────────────────
app.currency=INR
app.name=NeoBank

# ─── Email (Monthly Reports — configured when ready) ─────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Swagger / OpenAPI ───────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.neobank=DEBUG
logging.level.org.springframework.security=INFO
