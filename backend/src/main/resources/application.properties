# ═══════════════════════════════════════════════════════════════
#  NeoBank Backend — Application Configuration (Dev Profile)
# ═══════════════════════════════════════════════════════════════

spring.application.name=neobank
server.port=8080

# ─── H2 In-Memory Database ───────────────────────────────────
spring.datasource.url=jdbc:h2:mem:neobankdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ─────────────────────────────────────────────────────
# Secret must be Base64-encoded and at least 256 bits for HS256
jwt.secret=bmVvYmFua1N1cGVyU2VjcmV0S2V5Rm9yVGhlQmVzdEJhbmtpbmdBcHBJbkluZGlhMjAyNA==
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# ─── App Defaults ────────────────────────────────────────────
app.currency=INR
app.name=NeoBank

# ─── Email (Monthly Reports — configured when ready) ─────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Swagger / OpenAPI ───────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.neobank=DEBUG
logging.level.org.springframework.security=INFO
